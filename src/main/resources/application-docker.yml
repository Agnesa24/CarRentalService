spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/carrentaldb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  enable-hateoas: false
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080